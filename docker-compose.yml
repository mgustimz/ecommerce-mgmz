services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-mgmz-postgres
    environment:
      POSTGRES_DB: ecommerce_mgmz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_mgmz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
